{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <!-- Different Device Display / Accessibility -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=6.0, user-scalable=yes">

    <!-- Your CSS style-sheet static location -->
    <link rel="stylesheet" href="{% static 'CSS/styleSheet.css' %}"/>

    <!-- Code to CDN Bootstrap CSS Remote repository -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Favicon - Tab icon -->
    <link rel="icon" type="image/x-icon" href="../static/image/favicon.ico">

    <!-- Font Awesome - Webpage icons -->
    <script src="https://kit.fontawesome.com/f382cfac43.js" crossorigin="anonymous"></script>

    <!-- Title block to be used across all templates -->
    <title>The Post Office</title>
</head>

<body>

<!-- Main content area -->
        <div class="container d-flex justify-content-center align-items-center min-vh-100">
            <div class="login-container">
                <div class="align-items-center gap-2 mb-3">
                        <h4 class="login-title">Welcome To The Local Post Office</h4>
                        <a class="btn btn-primary" href="/staffLogin/">Staff Login</a>
                        <br>
                    </div>

                    <div class="text-muted small">
                        Staff credentials required to login.
                    </div>

            </div>
        </div>

<!-- Bootstrap java script CDN -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<!-- JavaScript file location for specific HTML page -->
<script src="../static/javascript/form_success.js" async></script>

</body>
</html>
