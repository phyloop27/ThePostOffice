{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <!-- Different Device Display / Accessibility -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=6.0, user-scalable=yes">

    <!-- Your CSS style-sheet static location -->
    <link rel="stylesheet" href="{% static 'CSS/styleSheet.css' %}"/>

    <!-- Code to CDN Bootstrap CSS Remote repository -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome - Webpage icons -->
    <script src="https://kit.fontawesome.com/f382cfac43.js" crossorigin="anonymous"></script>

    <!-- Title block to be used across all templates -->
    <title>The Post Office</title>
</head>

<body>

<!-- Main content area -->
    <div class="text-muted small">
        Welcome To the Post Office
          Click Below to login
    </div>

    <div class="d-flex justify-content-between align-items-center flex-wrap gap-2 mb-3">
        <h4 class="mb-0">Login</h4>
        <a class="btn btn-primary" href="/login/">Add PAC</a>
    </div>

<!-- Bootstrap java script CDN -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</html>
