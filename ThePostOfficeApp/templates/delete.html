{% extends 'base.html' %}

    {% block title %}Delete{% endblock %}
    {% block header %}Confirm Delete{% endblock %}

    {% block content %}
    <div class="container mt-4">
        <div class="col-lg-6 mx-auto student-records">
            <p>Are you sure you want to delete <strong>{{ customer.first_name }} {{ customer.last_name }}</strong>?</p>

            <form method="post">
            {% csrf_token %}
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-danger">Yes, delete</button>
                    <a href="{% url 'customerDetails' %}" class="btn btn-secondary">No, go back</a>
                </div>
            </form>
        </div>
    </div>
    {% endblock %}
